name: CI
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rubocop

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec brakeman -q --no-pager
      - run: bundle exec bundler-audit check --update

  prod-image-smoke:
    # Builds the real production image and renders a PDF inside it, so a broken
    # PDF toolchain (missing Node.js, Chromium libraries, launch failure) is
    # caught at PR time rather than only when a user generates a brief. Runs on
    # amd64, the same architecture as the Azure Container Apps runtime.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: production
          load: true
          tags: megadmin-prod
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod
      - name: Smoke test PDF rendering (real published Google Doc)
        run: >-
          docker run --rm -w /app megadmin-prod
          bundle exec ruby -e '
          require "grover";
          url = "https://docs.google.com/document/d/e/2PACX-1vRga67T_20rnTp9JtgEuprfiSnTlFohxlHiwj2jF4u97n8TNMXF7wWax2nzNgJbYW-e0jYhTNK3mqVK/pub";
          pdf = Grover.new(url, format: "A4", wait_until: "networkidle0",
            launch_args: ["--no-sandbox", "--disable-setuid-sandbox", "--disable-dev-shm-usage"]).to_pdf;
          raise "Grover produced no PDF" unless pdf && pdf.byteslice(0, 5) == "%PDF-";
          warn "Grover smoke test OK (#{pdf.bytesize} bytes)"
          '

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build development image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: development
          load: true
          tags: megadmin-dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run tests
        run: >-
          docker run --rm --network host
          -e RAILS_ENV=test
          -e POSTGRES_HOST=localhost
          -e POSTGRES_USER=postgres
          -e POSTGRES_PASSWORD=postgres
          -v ${{ github.workspace }}/coverage:/app/coverage
          megadmin-dev
          bash -c "bin/rails db:test:prepare && bundle exec rspec"
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/.last_run.json ]; then
            jq -r '
              .result.line as $line |
              "## Code Coverage\n\n| Metric | Coverage |\n|--------|----------|\n| Line   | \($line)% |"
            ' coverage/.last_run.json >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
