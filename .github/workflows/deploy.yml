name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  schedule:
    # Weekly no-cache rebuild: Sunday at midnight UTC
    - cron: '0 0 * * 0'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/deploy-reusable.yml
    with:
      resource_group: rg-megadmin-production
      acr_name: acrmegadminproduction
      image_name: megadmin
      web_app_name: ca-megadmin-web
      worker_app_name: ca-megadmin-worker
      migrate_job_name: caj-megadmin-migrate
      environment_name: production
      app_url: https://megagameadmin.co.uk
      sentry_environment: production
      # Weekly scheduled run does a no-cache rebuild + PDF smoke test (toolchain-drift canary).
      use_cache: ${{ github.event_name != 'schedule' }}
      run_smoke_test: ${{ github.event_name == 'schedule' }}
      create_sentry_release: true
    secrets: inherit
