name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  schedule:
    # Weekly no-cache rebuild: Sunday at midnight UTC
    - cron: '0 0 * * 0'

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-megadmin-production
  ACR_NAME: acrmegadminproduction
  WEB_APP_NAME: ca-megadmin-web
  WORKER_APP_NAME: ca-megadmin-worker
  MIGRATE_JOB_NAME: caj-megadmin-migrate
  IMAGE_NAME: megadmin

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    # Records a GitHub Deployment so it shows in the repo's "Environments" panel
    # (Code tab sidebar) and on PRs/commits, with a link to the live app.
    environment:
      name: production
      url: https://megagameadmin.co.uk

    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so sentry-cli can associate commits with the release.
          fetch-depth: 0

      - name: Azure login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        run: |
          # <timestamp>-<sha> identifies each build uniquely and is reused for
          # BOTH the image tag and the Sentry release. The weekly no-cache
          # rebuild reuses the same commit SHA, so a plain :<sha> would be a
          # no-op on deploy (Container Apps only rolls out a new revision when
          # the image reference changes) AND would look like the same Sentry
          # release. The UTC timestamp makes every build a distinct tag and
          # release — so the rebuild always deploys and Sentry registers it as a
          # new release, surfacing any base-image drift it picked up.
          RELEASE_VERSION="$(date -u +%Y%m%d-%H%M%S)-${{ github.sha }}"
          IMAGE_REF="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${RELEASE_VERSION}"
          IMAGE_LATEST="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"
          CACHE_REF="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:cache"

          CACHE_ARGS=""
          if [ "${{ github.event_name }}" != "schedule" ]; then
            CACHE_ARGS="--cache-from type=registry,ref=${CACHE_REF}"
          fi

          docker buildx build \
            --target production \
            ${CACHE_ARGS} \
            --cache-to type=registry,ref=${CACHE_REF},mode=max \
            --build-arg SENTRY_RELEASE=${RELEASE_VERSION} \
            -t "$IMAGE_REF" \
            -t "$IMAGE_LATEST" \
            --push \
            .

          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> "$GITHUB_ENV"

      - name: Smoke test PDF rendering (real published Google Doc)
        # Only on the weekly no-cache rebuild. Normal deploys run after CI, and
        # CI's prod-image-smoke job already renders a PDF in the production
        # image, so re-running it here just made every release wait twice. The
        # scheduled rebuild has no CI gate, so this stays as a toolchain-drift
        # canary (missing Node, Chromium launch failure, base-image version drift).
        if: ${{ github.event_name == 'schedule' }}
        # Renders a real published Google Doc to PDF inside the just-built
        # production image.
        run: |
          docker run --rm -w /app "${{ env.IMAGE_REF }}" \
            bundle exec ruby -e '
              require "grover"
              url = "https://docs.google.com/document/d/e/2PACX-1vRga67T_20rnTp9JtgEuprfiSnTlFohxlHiwj2jF4u97n8TNMXF7wWax2nzNgJbYW-e0jYhTNK3mqVK/pub"
              pdf = Grover.new(
                url, format: "A4", wait_until: "networkidle0",
                launch_args: ["--no-sandbox", "--disable-setuid-sandbox", "--disable-dev-shm-usage"]
              ).to_pdf
              raise "Grover produced no PDF" unless pdf && pdf.byteslice(0, 5) == "%PDF-"
              warn "Grover smoke test OK (#{pdf.bytesize} bytes)"
            '

      - name: Update migration job image and run migrations
        run: |
          az containerapp job update \
            --name ${{ env.MIGRATE_JOB_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${{ env.IMAGE_REF }}"

          az containerapp job start \
            --name ${{ env.MIGRATE_JOB_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}

          # Wait for migration job to complete
          for i in $(seq 1 60); do
            STATUS=$(az containerapp job execution list \
              --name ${{ env.MIGRATE_JOB_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "[0].properties.status" -o tsv)
            if [ "$STATUS" = "Succeeded" ]; then
              echo "Migration completed successfully"
              break
            elif [ "$STATUS" = "Failed" ]; then
              echo "Migration failed!"
              exit 1
            fi
            echo "Waiting for migration to complete... (attempt $i/60)"
            sleep 10
          done

          if [ "$STATUS" != "Succeeded" ]; then
            echo "Migration timed out"
            exit 1
          fi

      - name: Update web container app
        run: |
          az containerapp update \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${{ env.IMAGE_REF }}"

      - name: Update worker container app
        run: |
          az containerapp update \
            --name ${{ env.WORKER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${{ env.IMAGE_REF }}"

      - name: Health check
        run: |
          WEB_FQDN=$(az containerapp show \
            --name ${{ env.WEB_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$WEB_FQDN/up" || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting for app to become healthy... (attempt $i/30, status: $HTTP_STATUS)"
            sleep 10
          done

          echo "Health check failed after 5 minutes"
          exit 1

      - name: Prune old images from ACR
        # Basic-tier ACR has no retention policy, so old <timestamp>-<sha> release
        # tags and orphaned (untagged) manifests pile up and push storage past the
        # included 10 GB into paid overage. Now that the deploy is confirmed
        # healthy, delete release tags older than 30 days (recent ones stay for
        # rollback) plus any untagged manifests. The :latest and :cache tags are
        # rewritten on every deploy, so they're always fresh and never match the
        # date-prefixed filter. Runs as an ACR Task (supported on Basic) using the
        # already-authenticated Azure session; never fails the deploy.
        continue-on-error: true
        run: |
          az acr run --registry ${{ env.ACR_NAME }} \
            --cmd "acr purge --filter '${{ env.IMAGE_NAME }}:[0-9]{8}-.*' --ago 30d --untagged" \
            /dev/null

      - name: Create Sentry release
        # Runs sentry-cli under the hood: creates the release, associates commits
        # (suspect-commit / regression detection), finalizes it, and records a
        # production deploy. Only reached once the deploy is confirmed healthy.
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          # Same <timestamp>-<sha> as the deployed image, so the release Sentry
          # creates matches the release baked into the running app (SENTRY_RELEASE)
          # and each rebuild is a distinct release. set_commits auto still derives
          # the commit range from git (HEAD + previous release), independent of the
          # release name, so Fixes/suspect-commit association keeps working.
          release: ${{ env.RELEASE_VERSION }}
          set_commits: auto
          environment: production
